name: Docker CI

on:
  pull_request:
    branches: ['main']
    paths: ['Dockerfile','*.go','go.*','.github/workflows/ci-docker.yml']

env:
  GHCR_IMAGE_NAME: ghcr.io/blinklabs-io/nview

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
      - name: qemu
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4 https://github.com/docker/setup-qemu-action/releases/tag/v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4 https://github.com/docker/setup-buildx-action/releases/tag/v4
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6 https://github.com/docker/metadata-action/releases/tag/v6
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
      - name: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7 https://github.com/docker/build-push-action/releases/tag/v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || '' }}
            COMMIT_HASH=${{ github.sha }}
